name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Compute version from commit count
        id: version
        run: |
          COMMITS=$(git rev-list --count HEAD)
          VERSION="0.1.${COMMITS}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Write version into manifests
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = v;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
            const confPath = "src-tauri/tauri.conf.json";
            const conf = JSON.parse(fs.readFileSync(confPath, "utf8"));
            conf.version = v;
            fs.writeFileSync(confPath, JSON.stringify(conf, null, 2) + "\n");
          '
          # Cargo.toml — BSD sed (macOS runner) needs the '' arg after -i.
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build engine sidecar
        run: pnpm build:sidecar

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: Zeros v${{ steps.version.outputs.version }}
          releaseBody: |
            Auto-release from commit ${{ github.sha }}.

            The installed app will pick this up via the auto-updater on next launch.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
