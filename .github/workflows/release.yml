name: Release

# Manual-only trigger. Run with:
#   gh workflow run release.yml
# Or from the Actions tab in GitHub. Every invocation builds a
# fresh Zeros .dmg + .zip + latest-mac.yml and publishes them to
# GitHub Releases. The installed app's auto-updater picks them up
# on next launch.

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun (for engine sidecar compile)
        uses: oven-sh/setup-bun@v2

      - name: Compute version from commit count
        id: version
        run: |
          COMMITS=$(git rev-list --count HEAD)
          VERSION="0.1.${COMMITS}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Write version into package.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = v;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build engine sidecar (bun → binaries/zeros-engine-*)
        run: pnpm build:sidecar

      - name: Compile Electron main + preload
        run: pnpm electron:compile

      - name: Build Vite renderer
        run: pnpm build:ui

      - name: Package .dmg + .zip with electron-builder
        # electron-builder rebuilds native modules (keytar, node-pty)
        # against Electron's Node ABI as part of the pack step. The
        # afterPack hook runs `codesign --force --deep --sign -` to
        # produce a valid ad-hoc signature for arm64 — the user strips
        # quarantine after install with `xattr -cr /Applications/Zeros.app`.
        #
        # `--publish never` disables electron-builder's own auto-
        # upload. Without this flag, the `publish: github` block in
        # electron-builder.yml (which we keep so latest-mac.yml gets
        # the correct update URLs) would make electron-builder try
        # to instantiate a GitHubPublisher during pack, which errors
        # with "GH_TOKEN not set" even though we never asked it to
        # publish. The explicit `gh release create` step below does
        # the actual upload.
        run: pnpm exec electron-builder --config electron-builder.yml --publish never

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"

          # Release notes — include the mandatory xattr step so first-
          # time installers don't hit Gatekeeper's "damaged" error.
          BODY=$(cat <<EOF
          Auto-release from commit \`${GITHUB_SHA}\`.

          ## Install

          1. Download \`Zeros-${VERSION}-arm64.dmg\` below.
          2. Drag **Zeros.app** into \`/Applications\`.
          3. Strip the quarantine attribute (unsigned build):
             \`\`\`bash
             xattr -cr /Applications/Zeros.app
             \`\`\`
          4. Launch from Spotlight / Finder.

          Already-installed apps pick this up via the auto-updater on
          next launch.
          EOF
          )

          # Make the release-create idempotent: delete any prior release
          # or tag with the same version first, then re-create.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --repo "$GITHUB_REPOSITORY"
            git push --delete origin "$TAG" 2>/dev/null || true
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Zeros v${VERSION}" \
            --notes "$BODY" \
            release/Zeros-${VERSION}-arm64.dmg \
            release/Zeros-${VERSION}-arm64-mac.zip \
            release/latest-mac.yml
